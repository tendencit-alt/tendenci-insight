name: Deploy Supabase Edge Functions
# Deploya todas as edge functions quando algo em supabase/functions/ muda.
# Requer o secret SUPABASE_ACCESS_TOKEN (Supabase Dashboard -> Account -> Access Tokens).
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: kqmtxbstjwvcfyjluqtt
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions
        run: |
          set -e
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN nao configurado. Crie em https://supabase.com/dashboard/account/tokens e adicione em Settings > Secrets > Actions."
            exit 1
          fi
          FAILED=0
          for dir in supabase/functions/*/ ; do
            fn="$(basename "$dir")"
            [ "$fn" = "_shared" ] && continue
            [ -f "$dir/index.ts" ] || continue
            echo "== Deploying $fn"
            if ! supabase functions deploy "$fn" --project-ref "$PROJECT_REF"; then
              echo "::warning::Falha ao deployar $fn"
              FAILED=$((FAILED+1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED function(s) falharam no deploy"
            exit 1
          fi
          echo "Todas as functions deployadas com sucesso."
